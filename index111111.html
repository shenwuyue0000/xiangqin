<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>良缘荟 | 高端菁英相亲平台</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 外部样式表 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo">良缘荟 <span>· ÉLITE</span></div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="#">首页</a>
                <a href="#">遇见</a>
                <a href="#">故事</a>
                <a href="#" class="nav-btn">专属顾问</a>
            </div>
            <div id="userMenuContainer"></div>
        </div>
    </div>
    <div class="hero">
        <h1>相逢如诗，<span class="accent">心意相通</span></h1>
        <p>汇聚城市菁英，以真挚联结未来。找到与你灵魂共鸣的同行者。</p>
    </div>
    <div class="filter-bar">
        <div class="filter-group"><i class="fas fa-venus-mars"></i><select id="filterGender"><option value="all">全部性别</option><option value="女">女士</option><option value="男">男士</option></select></div>
        <div class="filter-group"><i class="fas fa-calendar-alt"></i><select id="filterAge"><option value="all">全部年龄</option><option value="20-30">20 ~ 30岁</option><option value="31-40">31 ~ 40岁</option><option value="41-50">41 ~ 50岁</option></select></div>
        <button class="reset-btn" id="resetFilterBtn"><i class="fas fa-undo-alt"></i> 重置筛选</button>
    </div>
    <div id="cardsContainer" class="cards-grid"></div>
</div>
<div class="footer"><i class="fas fa-heart" style="color: #c7a55b; margin-right: 6px;"></i> 用心相遇 · 良缘荟高端婚恋</div>

<!-- 外部 JavaScript -->
<script src="js/main.js" defer></script>
</body>
</html>
